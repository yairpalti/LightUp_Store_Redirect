        .lang-dock {
            position: fixed;
            z-index: 200;
            top: max(12px, env(safe-area-inset-top, 0px));
            inset-inline-start: max(12px, env(safe-area-inset-left, 0px));
        }
        .lang-dock-toggle {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
            min-width: 48px;
            min-height: 44px;
            padding: 6px 10px;
            font: inherit;
            border-radius: 12px;
            border: 1px solid var(--card-border);
            background: rgba(18, 18, 18, 0.92);
            backdrop-filter: blur(10px);
            color: var(--text);
            cursor: pointer;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.45);
            transition: border-color 0.15s ease, background 0.15s ease, box-shadow 0.15s ease;

        .lang-dock-toggle:hover {
            border-color: rgba(255, 255, 255, 0.35);
            background: rgba(30, 30, 30, 0.95);

            outline-offset: 2px;
        }
        .lang-dock-flag {
            font-size: 22px;
            line-height: 1;
        }
        .lang-dock-chevron {
            font-size: 10px;
            opacity: 0.75;
            transition: transform 0.2s ease;
        }
        .lang-dock.is-open .lang-dock-chevron {
            transform: rotate(180deg);
        }
        .lang-dock-menu {
            position: absolute;
            top: calc(100% + 6px);
            inset-inline-start: 0;
            min-width: min(280px, calc(100vw - 24px));
            max-height: min(420px, 70vh);
            overflow-y: auto;
            margin: 0;
            padding: 6px;
            list-style: none;
            border-radius: 12px;
            border: 1px solid var(--card-border);

        }
        .lang-dock-item {

            align-items: center;
            gap: 12px;
            width: 100%;
            padding: 10px 12px;
            margin: 0;
            border: none;
            border-radius: 8px;
            font: inherit;
            font-size: 16px;
            text-align: start;
            color: var(--text);
            background: transparent;
            cursor: pointer;
            transition: background 0.12s ease;
        }
        .lang-dock-item:hover {
            background: rgba(255, 255, 255, 0.08);
        }
        .lang-dock-item.is-active {
            background: rgba(126, 184, 255, 0.18);
        }
        .lang-dock-item-flag {

            line-height: 1;
            flex-shrink: 0;
        }
        .lang-dock-item-name {

        }

            padding: 32px 20px 56px;

            margin-left: auto;

            font-size: clamp(24px, 4vw, 32px);

            margin-bottom: 12px;

            flex-wrap: wrap;
            justify-content: center;
            gap: 10px 16px;

            padding: 16px;

            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 12px;
            list-style: none;

        .guide-toc a {

            font-size: 17px;
            line-height: 1.65;
        }
        .guide-stage li {
            margin-bottom: 10px;
        }
        .guide-stage li strong {
            color: var(--text);
        }
        .guide-figure {

            border-radius: 12px;
            overflow: hidden;
            border: 1px solid var(--card-border);
            background: rgba(0, 0, 0, 0.35);

    <script src="../js/event-success-l10n.js"></script>
    <script>
(function() {
    document.addEventListener('DOMContentLoaded', function () {
        try {
            if (window.LightUpEventSuccessL10n) {
                window.LightUpEventSuccessL10n.init();
            }
        } catch (e) {}
    });
    document.querySelectorAll('a[href^="#"]').forEach(function (anchor) {
        anchor.addEventListener('click', function (e) {
            var id = anchor.getAttribute('href');
            if (id === '#') return;
            var target = document.querySelector(id);
            if (target) {
                e.preventDefault();
                target.scrollIntoView({ behavior: 'smooth', block: 'start' });
            }
        });
    });
})();
    </script>
