<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join show — LightUp Crowd</title>
    <meta name="robots" content="noindex">
    <link rel="icon" href="../favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="../css/site.css">
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-DJZX1HFPLB"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-DJZX1HFPLB');
    </script>
    <style>.box{max-width:560px;margin:48px auto;padding:0 20px;text-align:center}</style>
</head>
<body>
    <div class="box">
        <h1>LightUp Crowd</h1>
        <p id="msg">Opening the app store…</p>
        <button type="button" id="lightup-continue-store" class="lightup-store-btn">Continue to App Store</button>
        <p style="font-size:14px;color:#666">If the app is installed, this link opens it. Otherwise you’ll go to the App Store or Google Play.</p>
    </div>
    <script src="../js/deep-link-redirect.js?v=20260428-2"></script>
    <script>
      (function () {
        var params = new URLSearchParams(window.location.search);
        var eventId = params.get('e') || params.get('event') || '';
        if (!eventId) {
          var parts = window.location.pathname.replace(/\/+$/, '').split('/');
          var ji = parts.indexOf('join');
          if (ji >= 0 && parts[ji + 1]) {
            try {
              eventId = decodeURIComponent(parts[ji + 1]);
            } catch (e) {
              eventId = parts[ji + 1];
            }
          }
        }
        if (eventId) {
          gtag('event', 'deep_link_join', { event_id: eventId });
        } else {
          gtag('event', 'deep_link_join_generic');
        }
        window.LightUpRedirect.run({ eventId: eventId || '', token: '' });
      })();
    </script>
</body>
</html>
